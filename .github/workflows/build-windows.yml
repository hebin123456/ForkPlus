name: Build Windows

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: msbuild ForkPlus.sln /t:Restore /p:Configuration=Release

      - name: Build (Release)
        run: msbuild ForkPlus.sln /p:Configuration=Release /p:Platform="Any CPU" /m /v:minimal

      - name: Run smoke tests
        shell: pwsh
        run: |
          $dll = "src/ForkPlus.Tests/bin/Release/net472/ForkPlus.Tests.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "Test assembly not found at $dll — skipping tests"
            exit 0
          }
          # 用 NuGet 还原的 Microsoft.TestPlatform 中的 vstest.console.exe，
          # 它会被 Test.Sdk 引用并放到测试项目的输出目录附近。优先用项目自带，
          # 其次搜索 nuget 全局包目录。windows-latest 上 dotnet 也可用，但 net472
          # 测试需要 Windows 测试宿主，vstest.console.exe 是最可靠的方式。
          $candidates = @(
            "src/ForkPlus.Tests/bin/Release/net472/vstest.console.exe",
            "src/ForkPlus.Tests/bin/Release/net472/testhost.exe"
          )
          $vstest = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $vstest) {
            # 搜索 nuget 全局包目录里的 vstest.console.exe
            $nugetRoot = "$env:USERPROFILE\.nuget\packages"
            $vstest = Get-ChildItem -Path $nugetRoot -Recurse -Filter "vstest.console.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match 'net472' } | Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $vstest) {
            # 最后回退到 VS 安装目录
            $vsCandidates = @(
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe",
              "C:\Program Files\Microsoft Visual Studio\2022\Professional\Common7\IDE\Extensions\TestPlatform\vstest.console.exe",
              "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\IDE\Extensions\TestPlatform\vstest.console.exe",
              "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe"
            )
            $vstest = $vsCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (-not $vstest) {
            # 用 dotnet test 作为最后手段（windows-latest 自带 dotnet）
            Write-Host "vstest.console.exe not found, falling back to: dotnet test"
            dotnet test $dll --no-build --framework net472
            exit $LASTEXITCODE
          }

          Write-Host "Using: $vstest"
          & $vstest $dll
          exit $LASTEXITCODE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForkPlus-windows
          path: src/ForkPlus/bin/Release/net472/
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path src/ForkPlus/bin/Release/net472/* -DestinationPath ForkPlus-${{ github.ref_name }}-windows.zip -CompressionLevel Optimal

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ForkPlus-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
