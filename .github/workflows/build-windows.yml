name: Build Windows

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: msbuild ForkPlus.sln /t:Restore /p:Configuration=Release

      - name: Build (Release)
        run: msbuild ForkPlus.sln /p:Configuration=Release /p:Platform="Any CPU" /m /v:minimal

      - name: Run smoke tests
        shell: pwsh
        run: |
          $dll = "src/ForkPlus.Tests/bin/Release/net472/ForkPlus.Tests.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "Test assembly not found at $dll — skipping tests"
            exit 0
          }
          # 用 windows-latest 自带的 dotnet CLI 运行测试（net472 测试需要 Windows 测试宿主，
          # dotnet test 会自动处理）。--no-build 避免重复编译（上一步已构建）。
          dotnet test $dll --no-build --framework net472 -- RunConfiguration.TestSessionTimeout=120000
          exit $LASTEXITCODE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForkPlus-windows
          path: src/ForkPlus/bin/Release/net472/
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path src/ForkPlus/bin/Release/net472/* -DestinationPath ForkPlus-${{ github.ref_name }}-windows.zip -CompressionLevel Optimal

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ForkPlus-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
