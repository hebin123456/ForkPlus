name: Build Windows

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: msbuild ForkPlus.sln /t:Restore /p:Configuration=Release

      - name: Build (Release)
        run: msbuild ForkPlus.sln /p:Configuration=Release /p:Platform="Any CPU" /m /v:minimal

      - name: Run smoke tests
        shell: pwsh
        run: |
          $vstest = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vstest) {
            $vstest = Get-ChildItem "$env:USERPROFILE\.nuget\packages\microsoft.testplatform.testhost\*\tools\net472\vstest.console.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          $dll = "src/ForkPlus.Tests/bin/Release/net472/ForkPlus.Tests.dll"
          if (Test-Path $dll) {
            Write-Host "Running smoke tests: $dll"
            & $vstest.FullName $dll
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Test assembly not found at $dll — skipping tests"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForkPlus-windows
          path: src/ForkPlus/bin/Release/net472/
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path src/ForkPlus/bin/Release/net472/* -DestinationPath ForkPlus-${{ github.ref_name }}-windows.zip -CompressionLevel Optimal

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ForkPlus-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
