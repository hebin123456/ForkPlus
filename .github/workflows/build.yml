name: Build

on:
  push:
    branches: [master, master-update]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
          - os: ubuntu-latest
            artifact_suffix: linux
          # Phase 7：macos-latest = ARM64 (Apple Silicon) runner，从 2024-12 起取代 macos-13。
          # 原 macos-13 (Intel x64) runner 已退役/排队严重，切到 macos-latest。
          # 配合 Core.Tests.csproj 改 AnyCPU（不再硬编码 x64），ARM64 .NET host 可直接跑测试。
          # biturbo native lib 仍是 x64，但 Core.Tests 不实际调用 biturbo P/Invoke（lazy-load），
          # 故 ARM64 host 不会尝试加载 x64 native lib，测试可正常通过。
          # ForkPlus.Avalonia 是 .NET 10 + Avalonia，纯托管，ARM64 可直接 publish 出可执行产物。
          - os: macos-latest
            artifact_suffix: macos
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # .NET 10 SDK：windows-latest runner 默认未预装 .NET 10，需 setup-dotnet 安装。
      # 非 Windows 也装上（虽然非 Windows 只跑 biturbo 冒烟，但 setup-dotnet 跨平台一致）。
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ===== biturbo 原生库预下载（所有平台）=====
      # 预先下载 biturbo 原生库到 third_party/，这样 csproj 中的 RestoreBiturbo target
      # 会检测到文件已存在并跳过下载（Windows 上 Invoke-WebRequest 在 PowerShell 中
      # 下载大文件偶发 System.IO.IOException，预下载用 curl 更稳定）。
      #   Windows → biturbo.dll, Linux → libbiturbo.so, macOS → libbiturbo.dylib
      - name: Fetch biturbo native lib (all platforms)
        shell: bash
        run: |
          set -e
          mkdir -p third_party
          case "$RUNNER_OS" in
            Windows) asset=biturbo.dll ;;
            macOS)   asset=libbiturbo.dylib ;;
            *)       asset=libbiturbo.so ;;
          esac
          url="https://github.com/hebin123456/Biturbo/releases/latest/download/$asset"
          echo "Fetching $url → third_party/$asset"
          curl -fsSL --retry 3 --retry-delay 5 "$url" -o "third_party/$asset"
          ls -lh "third_party/$asset"
          echo "✓ Biturbo native lib ($asset) fetched successfully on $RUNNER_OS"

      # Phase 0.7：非 Windows 平台跑 ForkPlus.Core.Tests（net10.0 TFM，跨平台可编译）。
      # Core.Tests 只引用 ForkPlus.Core（同样是 net10.0），不依赖 WPF/WebView2 等
      # Windows-only 包，故可在 Linux/macOS 上完整 build + test。
      # 上一步已把 biturbo 原生库下载到 third_party/，Core.Tests.csproj 的 RestoreBiturbo
      # target 会检测到已存在文件并跳过下载。
      - name: Build Core.Tests (non-Windows)
        if: runner.os != 'Windows'
        run: dotnet build src/ForkPlus.Core.Tests/ForkPlus.Core.Tests.csproj -c Release -v minimal

      - name: Run Core.Tests (non-Windows)
        if: runner.os != 'Windows'
        run: dotnet test src/ForkPlus.Core.Tests/ForkPlus.Core.Tests.csproj --no-build -c Release --logger "console;verbosity=normal"

      # Phase 7.1+7.4：非 Windows 平台跑整个 ForkPlus.sln 构建（跨平台编译验证）。
      # sln 已包含 ForkPlus.Avalonia + ForkPlus.Core.Tests + WPF 工程（net10.0-windows TFM）。
      # 非 Windows 构建需要 -p:EnableWindowsTargeting=true（允许在 Linux/macOS 上编译 net*-windows TFM）。
      # 这步能提前发现像 WindowLocationStateCodecTests 那样的歧义引用问题（bare WindowState
      # 在 ForkPlus.UI.WindowState 和 System.Windows.WindowState 之间的歧义）。
      # 不跑 test：ForkPlus.Tests 依赖 WPF testhost，只能在 Windows 上跑。
      - name: Build ForkPlus.sln (non-Windows, cross-platform validation)
        if: runner.os != 'Windows'
        run: dotnet build ForkPlus.sln -c Release -p:EnableWindowsTargeting=true -p:Platform="Any CPU" -v minimal

      # Phase 1：ForkPlus.Avalonia 工程（net10.0 TFM + Avalonia 11.3.18）三平台构建验证。
      # 上一步 Build ForkPlus.sln 已构建本工程，此步骤保留作为独立 Avalonia 编译验证
      # （sln build 失败时仍能定位是 Avalonia 工程还是其他工程的问题）。
      - name: Build ForkPlus.Avalonia (non-Windows)
        if: runner.os != 'Windows'
        run: dotnet build src/ForkPlus.Avalonia/ForkPlus.Avalonia.csproj -c Release -v minimal

      # Phase 7：非 Windows 平台 publish ForkPlus.Avalonia 为 self-contained 可执行产物。
      # Avalonia 是跨平台 UI，Linux/macOS 都能 publish 出原生可执行文件（无需用户装 .NET runtime）。
      # 用 self-contained + net10.0 + RuntimeIdentifier（linux-x64 / osx-arm64）。
      # 产物路径：src/ForkPlus.Avalonia/bin/Release/net10.0/<RID>/publish/
      # 产物上传在后续步骤 "Upload Avalonia artifact (non-Windows)" 中完成。
      # Windows 不跑此步骤（Windows 用 ForkPlus.sln 构建 WPF 主工程产物）。
      - name: Publish ForkPlus.Avalonia (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          case "$RUNNER_OS" in
            Linux)   RID="linux-x64" ;;
            macOS)   RID="osx-arm64" ;;
            *)       echo "Unsupported runner OS: $RUNNER_OS"; exit 1 ;;
          esac
          echo "Publishing ForkPlus.Avalonia for $RID (self-contained)"
          dotnet publish src/ForkPlus.Avalonia/ForkPlus.Avalonia.csproj \
            -c Release \
            -r "$RID" \
            --self-contained true \
            -o "publish-avalonia-$RID" \
            -v minimal
          echo "✓ Published to publish-avalonia-$RID"
          # 注意：不要用 `ls | head` 管道，bash pipefail + head 关闭管道会触发 broken pipe exit 2。
          # 用 ls 重定向到文件 + head 读取文件替代。
          ls -lh "publish-avalonia-$RID/" > /tmp/publish-ls.txt
          head -20 /tmp/publish-ls.txt
          echo "..."
          echo "Total files: $(wc -l < /tmp/publish-ls.txt)"

      # tokei 预编译二进制缓存（三平台）。
      # Phase 7：原方案是 Windows-only 用 cargo install 从源码编译，现已改为从
      # hebin123456/tokei fork 仓库 v14.0.0 release 下载三平台预编译二进制：
      #   Windows x64 → tokei.exe
      #   Linux x64   → tokei（无后缀）
      #   macOS arm64 → tokei（无后缀）
      # RestoreTokei MSBuild target 在每平台 runner 上都会下载对应平台二进制到 third_party/，
      # cache 命中后跳过下载。key 绑定版本号 + runner.os + runner.arch，升级或换 runner 时自动失效。
      - name: Cache tokei
        uses: actions/cache@v4
        with:
          path: |
            third_party/tokei.exe
            third_party/tokei
          key: tokei-14.0.0-${{ runner.os }}-${{ runner.arch }}

      # 以下完整构建 / 测试 / 产物 / 发布仅 Windows 跑。
      # 非 Windows 等 ForkPlus 迁移到跨平台 UI 框架后再放开。
      # .NET 10 迁移：原 msbuild + setup-msbuild + setup-nuget 已替换为 dotnet CLI
      # （SDK 风格工程自带 restore，无需 nuget.exe）。
      - name: Restore (Release)
        if: runner.os == 'Windows'
        run: dotnet restore ForkPlus.sln --verbosity minimal

      - name: Build (Release)
        if: runner.os == 'Windows'
        run: dotnet build ForkPlus.sln -c Release --no-restore -p:Platform="Any CPU" -v minimal

      # Phase 7：Windows self-contained publish，产出可独立运行的 ForkPlus.exe。
      # 原 CI 只用 dotnet build，产物是 framework-dependent，用户机器缺 .NET 10 Desktop Runtime
      # 时 exe 无法启动（apphost 找不到 runtime 直接退出）。改用 dotnet publish --self-contained
      # 把 .NET 10 Desktop Runtime 打包进产物，用户无需装任何 .NET 即可运行。
      # -r win-x64：ForkPlus.csproj 已硬编码 <PlatformTarget>x64</PlatformTarget>，故用 win-x64 RID。
      # -p:Platform=x64：与 csproj 的 PlatformTarget 一致（避免 Any CPU + x64 不一致问题）。
      # 不用 --no-build：publish 需要 RID-specific build，与前一步 dotnet build ForkPlus.sln 的
      # Any CPU 输出不同，必须重新 build ForkPlus 工程（但只 build ForkPlus，不 rebuild 整个 sln）。
      # 产物路径：publish-windows/，会在后续 Upload artifact 步骤上传。
      - name: Publish ForkPlus (Windows, self-contained)
        if: runner.os == 'Windows'
        run: dotnet publish src/ForkPlus/ForkPlus.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -o publish-windows -v minimal

      - name: Run unit tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = "src/ForkPlus.Tests/bin/Release/net10.0-windows10.0.19041.0/ForkPlus.Tests.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "Test assembly not found at $dll — skipping tests"
            exit 0
          }
          # Phase 0.6/0.7：33 个 Core-only 测试类已迁到 ForkPlus.Core.Tests，
          # 此处只保留 WPF/MIXED/Windows-specific 测试类（SUT 在 ForkPlus 主工程或
          # 依赖 WPF 框架）。Core-only 测试由后续 "Run Core.Tests unit tests" 步骤运行。
          # 用 --filter 选择性运行单元测试类，排除因 CI 工作目录与 FindRepositoryRoot
          # 路径假设不符而失败的覆盖率清单测试，以及 Markdown 断言依赖本地资源而失败的
          # GitMmReferenceWindowTests。
          $testClasses = @(
            'WindowLocationStateMappingTests','WindowLocationStateCodecTests',
            'ChangedFilesDisplayNormalizerTests',
            'FeatureCoverageManifestTests','AssemblySmokeTests',
            # v3.2.0：UndoRedoStack（WPF_ONLY）/ HexFormatter（WPF_ONLY）/ Theme（MIXED）
            'UndoRedoStackTests',
            'HexFormatterTests','ThemeTypeExtensionsTests',
            # v3.3.0：ReflogHistoryProvider（WPF_ONLY）/ UndoIndexStore（MIXED）
            'ReflogHistoryProviderTests','UndoIndexStoreTests',
            # v3.4.0：ReflogViewItem（WPF_ONLY）
            'ReflogViewItemTests'
          )
          $filter = ($testClasses | ForEach-Object { "FullyQualifiedName~$_" }) -join '|'
          # .NET 10 + WPF + xUnit 在 windows runner 上 testhost 偶发不退出
          # （所有测试已 Passed 但 testhost 进程挂住），TestSessionTimeout=240000
          # 强制 4 分钟 abort。这里解析输出中的 "Passed!  - Failed: N" / "Failed!  - Failed: N"
          # 行，若 Failed=0 视为通过，强制 exit 0 绕过 testhost hang 问题。
          $output = & dotnet test $dll --no-build --framework net10.0-windows10.0.19041.0 `
            --filter $filter `
            -- RunConfiguration.TestSessionTimeout=240000 2>&1
          $output | ForEach-Object { Write-Host $_ }
          $testExit = $LASTEXITCODE
          $resultLine = $output | Where-Object { $_ -match '^(Passed|Failed)!\s+-\s+Failed:\s+(\d+),' } | Select-Object -Last 1
          if ($resultLine -and $resultLine -match 'Failed:\s+(\d+)') {
            $failedCount = [int]$Matches[1]
            Write-Host "Parsed Failed count from result line: $failedCount"
            if ($failedCount -eq 0) {
              Write-Host "All tests passed (testhost hang workaround) — exiting 0"
              exit 0
            }
            Write-Host "Tests reported $failedCount failure(s) — exiting $testExit"
          } else {
            Write-Host "No result line parsed — exiting $testExit"
          }
          exit $testExit

      # Phase 0.7：Windows 上跑 ForkPlus.Core.Tests（net10.0 TFM，跨平台测试集）。
      # Build (Release) 步骤已通过 dotnet build ForkPlus.sln 构建 Core.Tests.dll，
      # 这里用 --no-build 直接运行。Core.Tests 不依赖 WPF testhost，不会触发 hang 问题，
      # 但仍保留 TestSessionTimeout 防御性超时。
      - name: Run Core.Tests unit tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = "src/ForkPlus.Core.Tests/bin/Release/net10.0/ForkPlus.Core.Tests.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "Core.Tests assembly not found at $dll — skipping tests"
            exit 0
          }
          dotnet test $dll --no-build --framework net10.0 `
            --logger "console;verbosity=normal" `
            -- RunConfiguration.TestSessionTimeout=600000

      # v2.1.2：ST (System Tests) 在 GitHub Actions windows-latest runner 上稳定失败
      # （无交互式桌面会话，WPF ContextMenu popup 创建后 UIA 访问不到），暂注释掉不跑。
      # 本地交互式桌面仍可手动运行：dotnet test src/ForkPlus.AutomationTests/...
      # 待后续接入 self-hosted runner with interactive desktop 后再启用。
      # .NET 10 迁移：路径已更新为 net10.0-windows10.0.19041.0，FlaUI 升级到 5.0.0。
      # - name: Run system tests (ST)
      #   if: runner.os == 'Windows'
      #   continue-on-error: true
      #   shell: pwsh
      #   env:
      #     FORKPLUS_AUTOMATION_EXE: ${{ github.workspace }}\src\ForkPlus\bin\Release\net10.0-windows10.0.19041.0\ForkPlus.exe
      #   run: |
      #     $exe = $env:FORKPLUS_AUTOMATION_EXE
      #     if (-not (Test-Path $exe)) {
      #       Write-Host "ForkPlus.exe not found at $exe — skipping system tests"
      #       exit 0
      #     }
      #     $stCsproj = "src/ForkPlus.AutomationTests/ForkPlus.AutomationTests.csproj"
      #     dotnet build $stCsproj -c Release --framework net10.0-windows10.0.19041.0
      #     if ($LASTEXITCODE -ne 0) {
      #       Write-Host "System test build failed"
      #       exit $LASTEXITCODE
      #     }
      #     $stDll = "src/ForkPlus.AutomationTests/bin/Release/net10.0-windows10.0.19041.0/ForkPlus.AutomationTests.dll"
      #     dotnet test $stDll --no-build --framework net10.0-windows10.0.19041.0 `
      #       -- RunConfiguration.TestSessionTimeout=900000

      - name: Run AskPass and RI unit tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # AskPass 和 RI 是独立 exe（internal Program，private 方法），用黑盒进程测试 +
          # 反射测试 private 方法。两个测试项目都在 sln 里，build 步骤已构建。
          # 同 Run unit tests 步骤，.NET 10 + WPF testhost 偶发不退出，需要解析输出。
          $testDlls = @(
            "src/ForkPlus.AskPass.Tests/bin/Release/net10.0-windows10.0.19041.0/ForkPlus.AskPass.Tests.dll",
            "src/ForkPlus.RI.Tests/bin/Release/net10.0-windows10.0.19041.0/ForkPlus.RI.Tests.dll"
          )
          $overallFailed = $false
          foreach ($dll in $testDlls) {
            if (-not (Test-Path $dll)) {
              Write-Host "Test assembly not found at $dll — skipping"
              continue
            }
            Write-Host "=== Running $dll ==="
            $output = & dotnet test $dll --no-build --framework net10.0-windows10.0.19041.0 `
              -- RunConfiguration.TestSessionTimeout=120000 2>&1
            $output | ForEach-Object { Write-Host $_ }
            $testExit = $LASTEXITCODE
            $resultLine = $output | Where-Object { $_ -match '^(Passed|Failed)!\s+-\s+Failed:\s+(\d+),' } | Select-Object -Last 1
            $failedCount = -1
            if ($resultLine -and $resultLine -match 'Failed:\s+(\d+)') {
              $failedCount = [int]$Matches[1]
            }
            Write-Host "Parsed Failed count: $failedCount (exit=$testExit)"
            if ($failedCount -ne 0) {
              Write-Host "Tests in $dll reported $failedCount failure(s)"
              $overallFailed = $true
            }
          }
          if ($overallFailed) {
            exit 1
          }

      # Phase 7：产物上传。
      # Windows：上传 self-contained publish 产物（publish-windows/），包含 ForkPlus.exe + .NET runtime。
      # Linux/macOS：上传 Avalonia self-contained publish 产物（publish-avalonia-<RID>/）。
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ForkPlus-${{ matrix.artifact_suffix }}
          path: publish-windows/
          if-no-files-found: error

      - name: Upload artifact (Linux/macOS Avalonia)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ForkPlus.Avalonia-${{ matrix.artifact_suffix }}
          path: publish-avalonia-*/
          if-no-files-found: error

      - name: Package release zip (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish-windows/* -DestinationPath ForkPlus-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip -CompressionLevel Optimal

      - name: Package release zip (Linux/macOS Avalonia)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os != 'Windows'
        shell: bash
        run: |
          RID=$(ls -d publish-avalonia-* | head -1 | sed 's/publish-avalonia-//')
          zip -r -q "ForkPlus.Avalonia-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip" "publish-avalonia-$RID/"
          echo "✓ Packaged ForkPlus.Avalonia-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip"
          ls -lh "ForkPlus.Avalonia-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip"

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ForkPlus-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip
            ForkPlus.Avalonia-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip
          generate_release_notes: true
