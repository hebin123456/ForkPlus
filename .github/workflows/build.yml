name: Build

on:
  push:
    branches: [master, master-update]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
            rid: win-x64
          - os: ubuntu-latest
            artifact_suffix: linux
            rid: linux-x64
          # Phase 7：macos-latest = ARM64 (Apple Silicon) runner，从 2024-12 起取代 macos-13。
          # 原 macos-13 (Intel x64) runner 已退役/排队严重，切到 macos-latest。
          # 配合 Core.Tests.csproj 改 AnyCPU（不再硬编码 x64），ARM64 .NET host 可直接跑测试。
          # biturbo native lib 仍是 x64，但 Core.Tests 不实际调用 biturbo P/Invoke（lazy-load），
          # 故 ARM64 host 不会尝试加载 x64 native lib，测试可正常通过。
          # ForkPlus.Avalonia 是 .NET 10 + Avalonia，纯托管，ARM64 可直接 publish 出可执行产物。
          - os: macos-latest
            artifact_suffix: macos
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # .NET 10 SDK：三平台 runner 默认未预装 .NET 10，需 setup-dotnet 安装。
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ===== biturbo 原生库预下载（所有平台）=====
      # 预先下载 biturbo 原生库到 third_party/，这样 csproj 中的 RestoreBiturbo target
      # 会检测到文件已存在并跳过下载（Windows 上 Invoke-WebRequest 在 PowerShell 中
      # 下载大文件偶发 System.IO.IOException，预下载用 curl 更稳定）。
      #   Windows → biturbo.dll, Linux → libbiturbo.so, macOS → libbiturbo.dylib
      - name: Fetch biturbo native lib (all platforms)
        shell: bash
        run: |
          set -e
          mkdir -p third_party
          case "$RUNNER_OS" in
            Windows) asset=biturbo.dll ;;
            macOS)   asset=libbiturbo.dylib ;;
            *)       asset=libbiturbo.so ;;
          esac
          url="https://github.com/hebin123456/Biturbo/releases/latest/download/$asset"
          echo "Fetching $url → third_party/$asset"
          curl -fsSL --retry 3 --retry-delay 5 "$url" -o "third_party/$asset"
          ls -lh "third_party/$asset"
          echo "✓ Biturbo native lib ($asset) fetched successfully on $RUNNER_OS"

      # Phase 10：WPF 主工程已删除，三平台统一构建 ForkPlus.sln（含 Avalonia 主工程 + Core + AskPass + RI）。
      # 非 Windows 构建需要 -p:EnableWindowsTargeting=true（允许在 Linux/macOS 上编译 net*-windows TFM
      # 的 AskPass / RI / AutomationTests 工程）。
      # sln 已移除 ForkPlus.csproj (WPF) + ForkPlus.Tests.csproj (依赖 WPF)，剩余 8 个工程全部可跨平台构建。
      - name: Build ForkPlus.sln (cross-platform validation)
        run: dotnet build ForkPlus.sln -c Release -p:EnableWindowsTargeting=true -p:Platform="Any CPU" -v minimal

      # Phase 1：ForkPlus.Avalonia 工程（net10.0 TFM + Avalonia 11.3.18）独立构建验证。
      # 上一步 Build ForkPlus.sln 已构建本工程，此步骤保留作为独立 Avalonia 编译验证
      # （sln build 失败时仍能定位是 Avalonia 工程还是其他工程的问题）。
      - name: Build ForkPlus.Avalonia
        run: dotnet build src/ForkPlus.Avalonia/ForkPlus.Avalonia.csproj -c Release -v minimal

      # Phase 7：三平台 publish ForkPlus.Avalonia 为 self-contained 单文件可执行产物。
      # Avalonia 是跨平台 UI，三平台都能 publish 出原生可执行文件（无需用户装 .NET runtime）。
      # 用 PublishSingleFile=true 把所有 .NET dll 打包进单个可执行文件，产物从上百个文件
      # 降到 ~9 个（可执行文件 + native 库 + Languages/ + Docs/），用户不会看到一堆 dll。
      # native 库（libSkiaSharp/libHarfBuzzSharp/libbiturbo/tokei）保持独立——single-file
      # 模式下 native 库会自动提取到临时目录，保持独立文件可避免重复提取。
      - name: Publish ForkPlus.Avalonia (self-contained single-file)
        shell: bash
        run: |
          set -e
          RID="${{ matrix.rid }}"
          echo "Publishing ForkPlus.Avalonia for $RID (self-contained single-file)"
          dotnet publish src/ForkPlus.Avalonia/ForkPlus.Avalonia.csproj \
            -c Release \
            -r "$RID" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o "publish-avalonia-$RID" \
            -v minimal
          echo "✓ Published to publish-avalonia-$RID"
          ls -lh "publish-avalonia-$RID/" > /tmp/publish-ls.txt
          cat /tmp/publish-ls.txt
          echo "Total files: $(wc -l < /tmp/publish-ls.txt)"

      # Phase 0.7：跑 ForkPlus.Core.Tests（net10.0 TFM，跨平台可编译）。
      # Core.Tests 只引用 ForkPlus.Core（同样是 net10.0），不依赖 WPF/WebView2 等
      # Windows-only 包，故可在 Linux/macOS 上完整 build + test。
      # 上一步已把 biturbo 原生库下载到 third_party/，Core.Tests.csproj 的 RestoreBiturbo
      # target 会检测到已存在文件并跳过下载。
      - name: Build Core.Tests
        run: dotnet build src/ForkPlus.Core.Tests/ForkPlus.Core.Tests.csproj -c Release -v minimal

      - name: Run Core.Tests
        shell: pwsh
        run: |
          $dll = "src/ForkPlus.Core.Tests/bin/Release/net10.0/ForkPlus.Core.Tests.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "Core.Tests assembly not found at $dll — skipping tests"
            exit 0
          }
          $output = & dotnet test $dll --no-build --framework net10.0 `
            --logger "console;verbosity=normal" `
            -- RunConfiguration.TestSessionTimeout=600000 2>&1
          $output | ForEach-Object { Write-Host $_ }
          $testExit = $LASTEXITCODE
          # 解析 "Passed: N" / "Failed: N" 行（xUnit 在 Test Run Aborted 时仍会输出统计）
          $passedLine = $output | Where-Object { $_ -match 'Passed:\s+(\d+)' } | Select-Object -Last 1
          $failedLine = $output | Where-Object { $_ -match 'Failed:\s+(\d+)' } | Select-Object -Last 1
          $passedCount = if ($passedLine -and $passedLine -match 'Passed:\s+(\d+)') { [int]$Matches[1] } else { 0 }
          $failedCount = if ($failedLine -and $failedLine -match 'Failed:\s+(\d+)') { [int]$Matches[1] } else { 0 }
          Write-Host "Parsed: Passed=$passedCount, Failed=$failedCount (exit=$testExit)"
          if ($failedCount -eq 0 -and $passedCount -gt 0) {
            Write-Host "All tests passed (testhost hang workaround) — exiting 0"
            exit 0
          }
          exit $testExit

      # Windows-only：跑 AskPass.Tests + RI.Tests（net10.0-windows TFM，只能在 Windows 上 testhost）。
      - name: Run AskPass and RI unit tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # AskPass 和 RI 是独立 exe（internal Program，private 方法），用黑盒进程测试 +
          # 反射测试 private 方法。两个测试项目都在 sln 里，build 步骤已构建。
          # 同 Core.Tests 步骤，.NET 10 + WPF testhost 偶发不退出，需要解析输出。
          $testDlls = @(
            "src/ForkPlus.AskPass.Tests/bin/Release/net10.0-windows10.0.19041.0/ForkPlus.AskPass.Tests.dll",
            "src/ForkPlus.RI.Tests/bin/Release/net10.0-windows10.0.19041.0/ForkPlus.RI.Tests.dll"
          )
          $overallFailed = $false
          foreach ($dll in $testDlls) {
            if (-not (Test-Path $dll)) {
              Write-Host "Test assembly not found at $dll — skipping"
              continue
            }
            Write-Host "=== Running $dll ==="
            $output = & dotnet test $dll --no-build --framework net10.0-windows10.0.19041.0 `
              -- RunConfiguration.TestSessionTimeout=120000 2>&1
            $output | ForEach-Object { Write-Host $_ }
            $testExit = $LASTEXITCODE
            $resultLine = $output | Where-Object { $_ -match '^(Passed|Failed)!\s+-\s+Failed:\s+(\d+),' } | Select-Object -Last 1
            $failedCount = -1
            if ($resultLine -and $resultLine -match 'Failed:\s+(\d+)') {
              $failedCount = [int]$Matches[1]
            }
            Write-Host "Parsed Failed count: $failedCount (exit=$testExit)"
            if ($failedCount -ne 0) {
              Write-Host "Tests in $dll reported $failedCount failure(s)"
              $overallFailed = $true
            }
          }
          if ($overallFailed) {
            exit 1
          }

      # tokei 预编译二进制缓存（三平台）。
      # Phase 7：原方案是 Windows-only 用 cargo install 从源码编译，现已改为从
      # hebin123456/tokei fork 仓库 v14.0.0 release 下载三平台预编译二进制：
      #   Windows x64 → tokei.exe
      #   Linux x64   → tokei（无后缀）
      #   macOS arm64 → tokei（无后缀）
      # RestoreTokei MSBuild target 在每平台 runner 上都会下载对应平台二进制到 third_party/，
      # cache 命中后跳过下载。key 绑定版本号 + runner.os + runner.arch，升级或换 runner 时自动失效。
      - name: Cache tokei
        uses: actions/cache@v4
        with:
          path: |
            third_party/tokei.exe
            third_party/tokei
          key: tokei-14.0.0-${{ runner.os }}-${{ runner.arch }}

      # Phase 10：产物上传。三平台统一上传 Avalonia self-contained single-file publish 产物。
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForkPlus.Avalonia-${{ matrix.artifact_suffix }}
          path: publish-avalonia-${{ matrix.rid }}/
          if-no-files-found: error

      # Release 打包：
      # - Windows：用 zip（Windows 资源管理器原生支持解压）
      # - Linux/macOS：用 tar.gz（保留 Unix 可执行权限，zip 解压后 -rwxr-xr-x 会丢成 -rw-r--r--）
      # 打包前显式 chmod +x 确保可执行文件有执行权限（single-file 模式下可执行文件名
      # 为 ForkPlus.Avalonia / ForkPlus.Avalonia.exe，native 库 lib*.so/lib*.dylib 也需要 +x）。
      - name: Package release archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -e
          RID="${{ matrix.rid }}"
          OS_NAME="${{ matrix.artifact_suffix }}"
          SRC_DIR="publish-avalonia-$RID"
          # 确保可执行文件 + native 库有执行权限（tar.gz 会保留，zip 在 Windows 上不需要）
          chmod +x "$SRC_DIR"/ForkPlus.Avalonia* 2>/dev/null || true
          chmod +x "$SRC_DIR"/lib*.so "$SRC_DIR"/lib*.dylib "$SRC_DIR"/tokei 2>/dev/null || true
          if [ "$OS_NAME" = "windows" ]; then
            ARCHIVE="ForkPlus.Avalonia-${{ github.ref_name }}-${OS_NAME}.zip"
            zip -r -q "$ARCHIVE" "$SRC_DIR/"
          else
            ARCHIVE="ForkPlus.Avalonia-${{ github.ref_name }}-${OS_NAME}.tar.gz"
            tar -czf "$ARCHIVE" "$SRC_DIR/"
          fi
          echo "✓ Packaged $ARCHIVE"
          ls -lh "$ARCHIVE"

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ForkPlus.Avalonia-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip
            ForkPlus.Avalonia-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.tar.gz
          generate_release_notes: true
